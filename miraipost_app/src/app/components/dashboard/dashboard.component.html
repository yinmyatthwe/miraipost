<body>
  <main class="dashboard">
    <h1 class="title">あなたの手紙一覧</h1>

    <div class="filter-buttons">
      <button class="filter-btn active">すべて</button>
      <button class="filter-btn">未来の自分へ</button>
      <button class="filter-btn">家族へ</button>
      <button class="filter-btn">友達へ</button>
    </div>

    <section class="letters">
      <div class="letter-card">
        <div class="letter-header">
          <h3>未来の自分へ</h3>
          <span class="status sent">送信待ち</span>
        </div>
        <p>今日は20歳の誕生日！！</p>
        <p class="date">2025年12月1日（あと〇日）</p>
      </div>

      <div class="letter-card">
        <div class="letter-header">
          <h3>元気で頑張って！！</h3>
          <span class="status received">受信待ち</span>
        </div>
        <p>わたしは元気で頑張っています。</p>
        <p class="date">2025年11月20日（あと〇日）</p>
      </div>

      <div class="letter-card">
        <div class="letter-header">
          <h3>お元気でやっていますか</h3>
          <span class="status draft">下書き</span>
        </div>
        <p>わたしは楽しく過ごしています。</p>
        <p class="date">2025年11月20日（あと〇日）</p>
      </div>
    </section>

    <section class="stats">
      <div class="stats-container">
        <button class="add-btn">宛先で検索</button>
        <div class="stats-boxes">
          <div class="stat-box">
            <p>今までに書いた手紙</p>
            <h2>12</h2>
          </div>
          <div class="stat-box empty"></div>
        </div>
      </div>
    </section>
  </main>
</body>
