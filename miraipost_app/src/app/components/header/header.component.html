<header class="header">
  <div class="header-container">
    <div class="logo">未来ポスト</div>
    
    <nav class="nav-menu">
      <a routerLink="/" class="nav-link">ホーム</a>
      <a routerLink="/write" class="nav-link">手紙を書く</a>
      <a routerLink="/dashboard" class="nav-link">手紙一覧</a>
      <!-- <a routerLink="/timeline" class="nav-link">タイムライン</a> -->
      <a routerLink="/about" class="nav-link">About Us</a>
    </nav>

    <!-- Show login/register when NOT logged in -->
    <div class="auth-links" *ngIf="!currentUser">
      <a routerLink="/login" class="auth-link">ログイン</a>
      <a routerLink="/register" class="auth-link register">新規登録</a>
    </div>

    <!-- Show user name and logout when logged in -->
    <div class="auth-links" *ngIf="currentUser">
      <a routerLink="/profile" class="auth-link user-name">{{ userName }}</a>
      <button (click)="onLogout()" class="auth-link logout-btn">ログアウト</button>
    </div>
  </div>
</header>
