<header class="header">
  <div class="header-container">
    <div class="logo">未来ポスト</div>
    
    <nav class="nav-menu">
      <a href="#" class="nav-link" [class.active]="activeLink === 'home'" (click)="setActive('home')">
        ホーム
      </a>
      <a href="#" class="nav-link" [class.active]="activeLink === 'write'" (click)="setActive('write')">
        手紙を書く
      </a>
      <a href="#" class="nav-link" [class.active]="activeLink === 'list'" (click)="setActive('list')">

        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
