<main class="write-letter-container">
  <div class="write-letter-card">
    <h2 class="write-letter-title">
      {{ isEditMode ? '手紙編集' : '手紙作成' }}
    </h2>

    <!-- Messages -->
    <div *ngIf="errorMessage" class="alert alert-error">
      {{ errorMessage }}
    </div>
    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <form class="write-letter-form" (ngSubmit)="onSubmit()">
      <!-- Who Section -->
      <div class="write-letter-section">
        <label class="write-letter-label">誰に向けての手紙</label>
        <div class="write-letter-selectbox">
          <select 
            class="write-letter-select"
            [(ngModel)]="letterData.recipient"
            name="recipient"
            [disabled]="isLoading">
            <option value="future">未来の自分へ向けて</option>
            <option value="family">大切な家族へ向けて</option>
            <option value="friend">大切な友達へ向けて</option>
          </select>
        </div>
      </div>

      <!-- Email Section -->
      <div class="write-letter-section">
        <label class="write-letter-label">宛先</label>
        <input 
          type="email" 
          class="write-letter-input"
          placeholder="メールアドレス"
          [(ngModel)]="letterData.email"
          name="email"
          [disabled]="isLoading"
          required>
      </div>

      <!-- Date Section -->
      <div class="write-letter-section">
        <label class="write-letter-label">お届け日</label>
        <input 
          type="date" 
          class="write-letter-input"
          [(ngModel)]="letterData.deliveryDate"
          name="deliveryDate"
          [disabled]="isLoading"
          required>
      </div>

      <!-- Title Section -->
      <div class="write-letter-section">
        <label class="write-letter-label">タイトル</label>
        <input 
          type="text" 
          class="write-letter-input"
          placeholder="手紙のタイトル"
          [(ngModel)]="letterData.title"
          name="title"
          [disabled]="isLoading"
          required>
      </div>

      <!-- Picture Section -->
      <div class="write-letter-section">
        <label class="write-letter-label">写真を追加</label>
        <input 
          type="file" 
          class="write-letter-file-input"
          accept="image/*"
          [disabled]="isLoading"
          (change)="onFileSelected($event)">
        <div *ngIf="selectedFileName" class="write-letter-file-name">
          選択済み: {{ selectedFileName }}
        </div>
      </div>

      <!-- Letter Content Section -->
      <div class="write-letter-section write-letter-content-section">
        <label class="write-letter-label">手紙の内容</label>

        <!-- Paper Selection -->
        <div class="write-letter-paper-select">
          <label class="write-letter-paper-option">
            <input 
              type="radio" 
              name="paper" 
              value="plain"
              [(ngModel)]="letterData.paperType"
              [disabled]="isLoading">
            <img src="/images/plain_paper.jpg" alt="シンプル便箋" class="write-letter-paper-image">
          </label>

          <label class="write-letter-paper-option">
            <input 
              type="radio" 
              name="paper" 
              value="flower"
              [(ngModel)]="letterData.paperType"
              [disabled]="isLoading">
            <img src="/images/flower.jpg" alt="花柄便箋" class="write-letter-paper-image">
          </label>

          <label class="write-letter-paper-option">
            <input 
              type="radio" 
              name="paper" 
              value="sky"
              [(ngModel)]="letterData.paperType"
              [disabled]="isLoading">
            <img src="/images/sky.jpg" alt="空柄便箋" class="write-letter-paper-image">
          </label>
        </div>

        <!-- Letter Textarea -->
        <textarea 
          class="write-letter-textarea"
          [ngClass]="'paper-' + letterData.paperType"
          placeholder="ここに手紙を書いてください"
          [(ngModel)]="letterData.content"
          name="content"
          rows="10"
          [disabled]="isLoading"
          required></textarea>
      </div>

      <!-- Action Buttons -->
      <div class="write-letter-actions">
        <button 
          type="button" 
          class="write-letter-btn save" 
          (click)="onSaveDraft()"
          [disabled]="isLoading">
          {{ isEditMode ? '下書きとして更新' : '一時保存' }}
        </button>
        <button 
          type="submit" 
          class="write-letter-btn send"
          [disabled]="isLoading">
          {{ isEditMode ? '更新して送信' : '送信' }}
        </button>
        <button 
          *ngIf="isEditMode"
          type="button" 
          class="write-letter-btn delete" 
          (click)="onDelete()"
          [disabled]="isLoading">
          削除
        </button>
      </div>
    </form>
  </div>
</main>
